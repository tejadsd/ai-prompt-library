spring.application.name=ai-prompt-library

# Server Configuration
server.port=8080

# Database Configuration (H2 File-based so data is persisted across restarts)
spring.datasource.url=jdbc:h2:file:./db/promptlib;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Logging Configuration
logging.level.com.example.promptlib=INFO
logging.level.org.springframework.ai=INFO

# Spring AI Config
# To run offline with high-quality mock data, leave this default-key-replace-me.
# To connect to real OpenAI, replace with your actual OpenAI API Key.
spring.ai.openai.api-key=default-key-replace-me
spring.ai.openai.chat.options.model=gpt-4o

# Ollama Configuration (Local LLM)
# To use a local Ollama instance, uncomment these properties and ensure Ollama is running.
# spring.ai.ollama.chat.options.model=llama3
# spring.ai.ollama.base-url=http://localhost:11434
